name = "edutempo-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "edutempo-db"
database_id = "5ae8ba18-2c49-49d9-96b9-23d4c146b96c"

# KV 暂时不需要
# [[kv_namespaces]]
# binding = "KV"
# id = "your-kv-id-here"

[vars]
CORS_ORIGIN = "https://edutempo.pages.dev"

# 环境变量（通过 wrangler secret 设置）
# JWT_SECRET = "your-jwt-secret"

# R2 需要在 Dashboard 中启用后取消注释
# [[r2_buckets]]
# binding = "UPLOADS"
# bucket_name = "edutempo-uploads"
